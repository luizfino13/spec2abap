name: abaplint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install -g @abaplint/cli
      - name: Run abaplint (skip if no ABAP files yet)
        run: |
          if find src -name "*.abap" -quit 2>/dev/null | grep -q .; then
            npx abaplint
          else
            echo "No ABAP files in /src yet — skipping lint."
          fi
